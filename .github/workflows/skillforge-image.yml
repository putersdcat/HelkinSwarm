# ============================================================================
# HelkinSwarm — SkillForge Base Image Build
# ⚠️ MARK FOR IMMEDIATE REFACTOR before first run in v2.
# Reference implementation only — alpha issue refs stripped.
#
# Builds the SkillForge ephemeral container base image and pushes to ACR.
# Triggered manually or when the Dockerfile changes.
#
# Refs: #67 (SkillForge container architecture)
# ============================================================================

name: SkillForge Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/Dockerfile.skillforge'
      - 'infra/skillforge-bootstrap.mjs'
      - 'src/skillforge/skillforge-prompt.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'eslint.config.js'
      - 'tsconfig.json'
      - 'tsconfig.mcp.json'
      - 'skills/core/manifest.json'
  workflow_dispatch:
    inputs:
      USER_ALIAS:
        description: '4-char hex user alias (e.g. a7f2)'
        required: false
        type: string

concurrency:
  group: skillforge-image-${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  USER_ALIAS: ${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}
  ACR_NAME: "helkinswarmacr${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}"
  IMAGE_NAME: helkinswarm-skillforge
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build SkillForge Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate USER_ALIAS format
        run: |
          if ! echo "${{ env.USER_ALIAS }}" | grep -qE '^[a-z0-9]{4}$'; then
            echo "❌ USER_ALIAS must be exactly 4 lowercase alphanumeric characters. Got: '${{ env.USER_ALIAS }}'"
            exit 1
          fi
          echo "✅ USER_ALIAS '${{ env.USER_ALIAS }}' is valid"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Image
        run: |
          docker build \
            -f infra/Dockerfile.skillforge \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Measure startup smoke
        id: coldstart
        shell: bash
        run: |
          set -euo pipefail
          START_MS=$(date +%s%3N)
          docker run -d --rm --name skillforge-startup-smoke \
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} >/tmp/skillforge-container-id.txt

          READY=0
          AUDIT_OK=0
          for _ in $(seq 1 20); do
            if docker logs skillforge-startup-smoke 2>&1 | grep -q 'SkillForge container ready'; then
              READY=1
            fi
            if docker logs skillforge-startup-smoke 2>&1 | grep -q '\[skillforge-audit\]'; then
              AUDIT_OK=1
            fi
            if [ "$READY" -eq 1 ] && [ "$AUDIT_OK" -eq 1 ]; then
              break
            fi
            sleep 0.5
          done

          END_MS=$(date +%s%3N)
          ELAPSED_MS=$((END_MS - START_MS))
          echo "elapsedMs=$ELAPSED_MS" >> "$GITHUB_OUTPUT"

          if [ "$READY" -ne 1 ]; then
            echo "❌ SkillForge container never reported ready during startup smoke."
            docker rm -f skillforge-startup-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          if [ "$AUDIT_OK" -ne 1 ]; then
            echo "❌ SkillForge container did not emit bootstrap audit records during startup smoke."
            docker rm -f skillforge-startup-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          if ! docker exec skillforge-startup-smoke sh -lc '
            set -eu
            command -v pnpm >/dev/null
            command -v tsc >/dev/null
            command -v eslint >/dev/null
            command -v prettier >/dev/null
            command -v playwright >/dev/null
            command -v gh >/dev/null
            command -v git >/dev/null
            command -v curl >/dev/null
            [ "$(id -u)" -ne 0 ]
            ! command -v sudo >/dev/null 2>&1
            [ ! -S /var/run/docker.sock ]
          '; then
            echo "❌ SkillForge toolchain/isolation smoke failed."
            docker rm -f skillforge-startup-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          if [ "$ELAPSED_MS" -gt 10000 ]; then
            echo "❌ SkillForge cold-start smoke exceeded 10s (${ELAPSED_MS}ms)."
            docker rm -f skillforge-startup-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          docker rm -f skillforge-startup-smoke >/dev/null 2>&1 || true

          echo "✅ SkillForge startup smoke passed in ${ELAPSED_MS}ms"

      - name: Push Image
        run: |

          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Summary
        run: |
          echo "### SkillForge Image Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest:** \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Startup smoke:** \`${{ steps.coldstart.outputs.elapsedMs }}ms\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Toolchain smoke:** \`pnpm tsc eslint prettier playwright gh git curl + non-root / no sudo / no docker.sock\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To activate SkillForge, set:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "SKILLFORGE_ENABLED=true" >> $GITHUB_STEP_SUMMARY
          echo "SKILLFORGE_ACR_IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
