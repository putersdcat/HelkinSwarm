# ============================================================================
# HelkinSwarm — deploy-stamp.yml: Stamped User Instance Deployment
# THE ONLY deployment workflow. Each run provisions/updates a complete
# user-isolated Azure footprint identified by USER_ALIAS.
#
# Spec refs: 0q-Multi-Instance-Architecture.md, 12-Deployment-CICD.md
# ============================================================================

name: Deploy Stamp

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'skills/**'
      - 'infra/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'host.json'
      - '.github/workflows/deploy-stamp.yml'
  workflow_dispatch:
    inputs:
      USER_ALIAS:
        description: "4-char alphanumeric user alias (e.g. a7f2). Defaults to vars.USER_ALIAS."
        required: false
        type: string
      EU_RESIDENCY_MODE:
        description: "Enable EU Data Residency (DataZoneStandard models)"
        required: false
        type: boolean
        default: false
      CREATE_OAUTH_CONNECTION:
        description: "Create/update the GraphOAuth Bot Service connection. Use on first deploy or when OAuth scopes change."
        required: false
        type: boolean
        default: false

# Only one stamp deployment at a time per alias
concurrency:
  group: deploy-${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  USER_PRINCIPAL_ID: ${{ vars.USER_PRINCIPAL_ID }}
  # Prefer explicit dispatch input; fall back to repo variable for push-triggered runs
  USER_ALIAS: ${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}
  RESOURCE_GROUP: "rg-helkinswarm-${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}"
  ACR_NAME: "helkinswarmacr${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Validate inputs
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate USER_ALIAS format
        run: |
          ALIAS="${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}"
          if ! echo "$ALIAS" | grep -qE '^[a-z0-9]{4}$'; then
            echo "❌ USER_ALIAS must be exactly 4 lowercase alphanumeric characters. Got: '$ALIAS'"
            exit 1
          fi
          echo "✅ USER_ALIAS '$ALIAS' is valid"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Deploy Infrastructure (Bicep)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Infrastructure
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      acr-login-server: ${{ steps.query.outputs.acrLoginServer }}
      acr-name: ${{ steps.query.outputs.acrName }}
      function-app-name: ${{ steps.query.outputs.functionAppName }}
      managed-identity-client-id: ${{ steps.query.outputs.managedIdentityClientId }}
      managed-identity-resource-id: ${{ steps.query.outputs.managedIdentityResourceId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect infrastructure changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infraChanged=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Manual dispatch — running full infra deployment."
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "infraChanged=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No reliable before-SHA available — running full infra deployment."
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}")
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^(infra/|\.github/workflows/deploy-stamp\.yml$)'; then
            echo "infraChanged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Infrastructure-affecting files changed — running Bicep deployment."
          else
            echo "infraChanged=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Code-only push detected — skipping Bicep deployment and reusing existing stamp resources."
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if not exists
        if: steps.changes.outputs.infraChanged == 'true'
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location eastus2 \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --tags "project=HelkinSwarm" "userAlias=${{ env.USER_ALIAS }}" "managedBy=deploy-stamp.yml"

      - name: Reset UAMI role assignments (idempotency pre-check)
        if: steps.changes.outputs.infraChanged == 'true'
        run: |
          set +e
          echo "🔍 Looking up UAMI principal ID..."
          UAMI_PRINCIPAL_ID=$(az identity show \
            --name "helkinswarm-id-${{ env.USER_ALIAS }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query principalId -o tsv 2>/dev/null || echo "")

          if [ -z "$UAMI_PRINCIPAL_ID" ]; then
            echo "ℹ️  UAMI not yet provisioned — skipping role assignment cleanup (first deploy)"
            exit 0
          fi

          echo "🧹 Removing ARM role assignments for UAMI $UAMI_PRINCIPAL_ID (Bicep will recreate)"
          ASSIGNMENT_IDS=$(az role assignment list \
            --assignee "$UAMI_PRINCIPAL_ID" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query "[].id" -o tsv 2>/dev/null || echo "")

          if [ -n "$ASSIGNMENT_IDS" ]; then
            echo "$ASSIGNMENT_IDS" | tr '\t' '\n' | while read -r ASSIGNMENT_ID; do
              [ -n "$ASSIGNMENT_ID" ] && \
                az role assignment delete --ids "$ASSIGNMENT_ID" 2>/dev/null || true
            done
            echo "✅ ARM role assignments cleared"
          else
            echo "ℹ️  No ARM role assignments found for UAMI"
          fi

      - name: Deploy Bicep
        id: bicep
        if: steps.changes.outputs.infraChanged == 'true'
        run: |
          set +e
          echo "🚀 Deploying Bicep for stamp '${{ env.USER_ALIAS }}'..."

          OAUTH_UPDATE_SHOULD_RUN="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OAUTH_UPDATE_SHOULD_RUN="${{ github.event.inputs.CREATE_OAUTH_CONNECTION || 'false' }}"
          else
            OAUTH_UPDATE_SHOULD_RUN="true"
          fi

          echo "ℹ️ OAuth connection update enabled: ${OAUTH_UPDATE_SHOULD_RUN}"

          # Fetch delegated auth client secret from KV for OAuth connection deploy
          KV_NAME="helkinswarm-kv-${{ env.USER_ALIAS }}"
          DELEGATED_SECRET=""
          if [ "$OAUTH_UPDATE_SHOULD_RUN" = "true" ]; then
            DELEGATED_SECRET=$(az keyvault secret show --vault-name "$KV_NAME" \
              --name "DelegatedAuthClientSecret" --query "value" -o tsv 2>/dev/null || echo "")
          fi

          CICD_PRINCIPAL_ID=$(az ad sp show --id "${{ env.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || echo "")
          echo "ℹ️ CICD principal object id: ${CICD_PRINCIPAL_ID}"

          DEPLOY_OUT=$(az deployment group create \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.parameters.json" \
              userAlias="${{ env.USER_ALIAS }}" \
              userPrincipalId="${{ vars.USER_PRINCIPAL_ID }}" \
              cicdPrincipalId="${CICD_PRINCIPAL_ID}" \
              alertEmail="${{ vars.ALERT_EMAIL }}" \
              euResidencyMode=${{ github.event.inputs.EU_RESIDENCY_MODE || 'false' }} \
              routerBotId="${{ vars.BOT_APP_ID }}" \
              routerUamiId="${{ vars.ROUTER_UAMI_ID }}" \
              createOAuthConnection=${OAUTH_UPDATE_SHOULD_RUN} \
              delegatedAuthClientSecret="$DELEGATED_SECRET" \
            --output json 2>&1)
          DEPLOY_EXIT=$?

          if [ $DEPLOY_EXIT -ne 0 ]; then
            ROLE_EXISTS=$(echo "$DEPLOY_OUT" | grep -c '"RoleAssignmentExists"' || true)
            # Bot Service ARM validates the endpoint during deploy. During container
            # restarts the probe arrives before the app is ready, returning 401/403.
            # This is safe to ignore — the Bot Service resource already exists with
            # the correct endpoint URL and the container will be healthy after deploy.
            BOT_VALIDATION=$(echo "$DEPLOY_OUT" | grep -c 'do not have permission' || true)
            # Count errors excluding known benign codes — use -o to match per-occurrence
            # (the entire JSON may be on a single line)
            TOTAL_CODES=$(echo "$DEPLOY_OUT" | grep -oP '"code"\s*:\s*"[^"]*"' | wc -l)
            # When we are explicitly updating the OAuth connection, BotService/OAuth deploy
            # failures are NOT benign — they leave /link broken while the workflow goes green.
            if [ "$OAUTH_UPDATE_SHOULD_RUN" = "true" ]; then
              BENIGN_CODES=$(echo "$DEPLOY_OUT" | grep -oP '"code"\s*:\s*"(RoleAssignmentExists|DeploymentFailed|BadRequest)"' | wc -l)
            else
              BENIGN_CODES=$(echo "$DEPLOY_OUT" | grep -oP '"code"\s*:\s*"(RoleAssignmentExists|DeploymentFailed|BadRequest|InvalidTemplateDeployment|715-123420)"' | wc -l)
            fi
            REAL_ERRORS=$((TOTAL_CODES - BENIGN_CODES))

            echo "  DEBUG: BOT_VALIDATION=$BOT_VALIDATION TOTAL_CODES=$TOTAL_CODES BENIGN_CODES=$BENIGN_CODES REAL_ERRORS=$REAL_ERRORS"

            if [ "$REAL_ERRORS" -eq 0 ]; then
              if [ "$BOT_VALIDATION" -gt 0 ]; then
                echo "⚠️  Bot Service endpoint validation failed (container restart timing)."
                echo "    Bot Service already exists — endpoint will be available after container starts."
              elif [ "$ROLE_EXISTS" -gt 0 ]; then
                echo "⚠️  RoleAssignmentExists: role assignments already provisioned."
                echo "    Continuing — Bicep will converge on next clean deploy."
              else
                echo "⚠️  Deployment had benign errors only — continuing."
              fi
            else
              echo "❌ Deployment failed with $REAL_ERRORS real error(s):"
              echo "$DEPLOY_OUT"
              exit 1
            fi
          fi

          echo "✅ Bicep deployment complete for stamp '${{ env.USER_ALIAS }}'"

      - name: Query deployed resources
        id: query
        run: |
          echo "📦 Querying deployed resources..."

          ACR_INFO=$(az acr list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query "[0]" --output json 2>/dev/null || echo '{}')

          FUNC_INFO=$(az functionapp list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query "[0]" --output json 2>/dev/null || echo '{}')

          UAMI_INFO=$(az identity show \
            --name "helkinswarm-id-${{ env.USER_ALIAS }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --output json 2>/dev/null || echo '{}')

          ACR_LOGIN=$(echo "$ACR_INFO" | jq -r '.loginServer // ""')
          ACR_NAME=$(echo "$ACR_INFO" | jq -r '.name // ""')
          FUNC_NAME=$(echo "$FUNC_INFO" | jq -r '.name // ""')
          MI_CLIENT_ID=$(echo "$UAMI_INFO" | jq -r '.clientId // ""')
          MI_RESOURCE_ID=$(echo "$UAMI_INFO" | jq -r '.id // ""')

          echo "  ACR: $ACR_NAME ($ACR_LOGIN)"
          echo "  Function App: $FUNC_NAME"
          echo "  UAMI Client ID: $MI_CLIENT_ID"

          if [ -z "$FUNC_NAME" ]; then
            echo "❌ Function App not found in ${{ env.RESOURCE_GROUP }}"
            exit 1
          fi

          echo "acrLoginServer=$ACR_LOGIN"       >> "$GITHUB_OUTPUT"
          echo "acrName=$ACR_NAME"               >> "$GITHUB_OUTPUT"
          echo "functionAppName=$FUNC_NAME"      >> "$GITHUB_OUTPUT"
          echo "managedIdentityClientId=$MI_CLIENT_ID"   >> "$GITHUB_OUTPUT"
          echo "managedIdentityResourceId=$MI_RESOURCE_ID" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Build & Push Container Image
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Container
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ needs.deploy-infra.outputs.acr-name }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm:${{ github.sha }}
          IMAGE_LATEST=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm:latest
          docker build -t $IMAGE -t $IMAGE_LATEST .
          docker push $IMAGE
          docker push $IMAGE_LATEST

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Deploy to Container Apps
  # ─────────────────────────────────────────────────────────────────────────
  deploy-app:
    name: Deploy to Container Apps
    needs: [deploy-infra, build-and-push]
    runs-on: ubuntu-latest
    outputs:
      fqdn: ${{ steps.verify.outputs.fqdn }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Function App container image
        run: |
          FUNC_NAME=${{ needs.deploy-infra.outputs.function-app-name }}
          ACR_SERVER=${{ needs.deploy-infra.outputs.acr-login-server }}
          MI_RESOURCE_ID=${{ needs.deploy-infra.outputs.managed-identity-resource-id }}
          MI_CLIENT_ID=${{ needs.deploy-infra.outputs.managed-identity-client-id }}
          IMAGE_TAG=${{ github.sha }}
          EXPECTED_BOT_APP_ID="${{ vars.BOT_APP_ID }}"
          EXPECTED_BOT_MSI_RESOURCE_ID="${{ vars.ROUTER_UAMI_ID }}"

          if [ -z "$EXPECTED_BOT_APP_ID" ]; then
            EXPECTED_BOT_APP_ID="$MI_CLIENT_ID"
          fi

          if [ -z "$EXPECTED_BOT_MSI_RESOURCE_ID" ]; then
            EXPECTED_BOT_MSI_RESOURCE_ID="$MI_RESOURCE_ID"
          fi

          # Normalise case to prevent ARM duplicate property errors by getting exact upstream IDs
          if [ -n "$MI_RESOURCE_ID" ]; then
            MI_RESOURCE_ID=$(az identity show --ids "$MI_RESOURCE_ID" --query id -o tsv 2>/dev/null || echo "$MI_RESOURCE_ID")
          fi
          if [ -n "$EXPECTED_BOT_MSI_RESOURCE_ID" ]; then
            EXPECTED_BOT_MSI_RESOURCE_ID=$(az identity show --ids "$EXPECTED_BOT_MSI_RESOURCE_ID" --query id -o tsv 2>/dev/null || echo "$EXPECTED_BOT_MSI_RESOURCE_ID")
          fi

          # Set ACR URL
          az functionapp config appsettings set \
            --name "${FUNC_NAME}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --settings DOCKER_REGISTRY_SERVER_URL="${ACR_SERVER}"

          # Keep identities aligned even on code-only deploys that skip Bicep.
          # When the router is live, the Function App must retain both the stamp
          # UAMI and the router UAMI so Bot Framework auth can use the shared
          # router identity (#214).
          if [ "$EXPECTED_BOT_MSI_RESOURCE_ID" != "$MI_RESOURCE_ID" ]; then
            az functionapp identity assign \
              --name "${FUNC_NAME}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --identities "$MI_RESOURCE_ID" "$EXPECTED_BOT_MSI_RESOURCE_ID" >/dev/null
          else
            az functionapp identity assign \
              --name "${FUNC_NAME}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --identities "$MI_RESOURCE_ID" >/dev/null
          fi

          # Repair Bot Framework app settings drift on every deploy. The live
          # outage in #214 was caused by MICROSOFT_APP_ID and the Bot Service
          # registration disagreeing about which UAMI is the bot identity.
          az functionapp config appsettings set \
            --name "${FUNC_NAME}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --settings \
              MICROSOFT_APP_ID="$EXPECTED_BOT_APP_ID" \
              MICROSOFT_APP_TYPE="UserAssignedMsi" \
              MICROSOFT_APP_TENANT_ID="${{ vars.AZURE_TENANT_ID }}"

          # Switch to ACR image with managed identity auth
          az rest --method PATCH \
            --url "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${FUNC_NAME}?api-version=2023-12-01" \
            --body "{\"properties\":{\"siteConfig\":{\"linuxFxVersion\":\"DOCKER|${ACR_SERVER}/helkinswarm:${IMAGE_TAG}\",\"acrUseManagedIdentityCreds\":true,\"acrUserManagedIdentityID\":\"${MI_RESOURCE_ID}\"}}}"

      - name: Verify deployment & health check
        id: verify
        run: |
          echo "⏳ Waiting for deployment to propagate..."
          sleep 30

          HOSTNAME=$(az functionapp show \
            --name ${{ needs.deploy-infra.outputs.function-app-name }} \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query defaultHostName -o tsv 2>/dev/null || echo "")

          if [ -z "$HOSTNAME" ]; then
            CAE_DOMAIN=$(az containerapp env list \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
              --query "[0].properties.defaultDomain" -o tsv 2>/dev/null || echo "")
            HOSTNAME="${{ needs.deploy-infra.outputs.function-app-name }}.${CAE_DOMAIN}"
          fi

          echo "🏥 Function App hostname: $HOSTNAME"
          echo "fqdn=$HOSTNAME" >> "$GITHUB_OUTPUT"

          # Health check with retries
          MAX_RETRIES=6
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOSTNAME/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              curl -s "https://$HOSTNAME/api/health" | jq .
              break
            fi
            RETRY=$((RETRY + 1))
            echo "⏳ Health check attempt $RETRY/$MAX_RETRIES returned HTTP $HTTP_CODE — retrying in 30s..."
            sleep 30
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Health check did not pass after $MAX_RETRIES attempts (HTTP $HTTP_CODE)"
            echo "   This may be expected on first deploy while the container starts."
          fi

      - name: Verify Bot Service endpoint
        run: |
          set +e
          EXPECTED_ENDPOINT="https://${{ steps.verify.outputs.fqdn }}/api/messages"
          RG="${{ env.RESOURCE_GROUP }}"
          SUB="${{ env.AZURE_SUBSCRIPTION_ID }}"
          EXPECTED_BOT_APP_ID="${{ vars.BOT_APP_ID }}"
          EXPECTED_BOT_MSI_RESOURCE_ID="${{ vars.ROUTER_UAMI_ID }}"

          if [ -z "$EXPECTED_BOT_APP_ID" ]; then
            EXPECTED_BOT_APP_ID="${{ needs.deploy-infra.outputs.managed-identity-client-id }}"
          fi

          if [ -z "$EXPECTED_BOT_MSI_RESOURCE_ID" ]; then
            EXPECTED_BOT_MSI_RESOURCE_ID="${{ needs.deploy-infra.outputs.managed-identity-resource-id }}"
          fi

          # Normalise case to prevent ARM duplicate property errors
          if [ -n "$EXPECTED_BOT_MSI_RESOURCE_ID" ]; then
            EXPECTED_BOT_MSI_RESOURCE_ID=$(az identity show --ids "$EXPECTED_BOT_MSI_RESOURCE_ID" --query id -o tsv 2>/dev/null || echo "$EXPECTED_BOT_MSI_RESOURCE_ID")
          fi

          BOT_NAME=$(az resource list \
            --resource-group "$RG" --subscription "$SUB" \
            --resource-type "Microsoft.BotService/botServices" \
            --query "[0].name" -o tsv 2>/dev/null || echo "")

          if [ -z "$BOT_NAME" ]; then
            echo "⚠️ No Bot Service found in $RG — skipping endpoint verification"
            exit 0
          fi

          CURRENT_BOT=$(az resource show \
            --resource-group "$RG" \
            --name "$BOT_NAME" \
            --resource-type Microsoft.BotService/botServices \
            --api-version 2022-09-15 -o json 2>/dev/null || echo "")

          if [ -z "$CURRENT_BOT" ]; then
            echo "⚠️ Could not query Bot Service (API may be temporarily unavailable after deploy)"
            echo "   Bot endpoint is set via Bicep — skipping verification."
            exit 0
          fi

          CURRENT_ENDPOINT=$(echo "$CURRENT_BOT" | jq -r '.properties.endpoint // ""')
          CURRENT_BOT_APP_ID=$(echo "$CURRENT_BOT" | jq -r '.properties.msaAppId // ""')
          CURRENT_BOT_MSI_RESOURCE_ID=$(echo "$CURRENT_BOT" | jq -r '(.properties.msaAppMSIResourceId // .properties.msaAppMsiResourceId // "")')

          echo "Expected: $EXPECTED_ENDPOINT"
          echo "Current:  $CURRENT_ENDPOINT"
          echo "Expected Bot App ID: $EXPECTED_BOT_APP_ID"
          echo "Current  Bot App ID: $CURRENT_BOT_APP_ID"
          echo "Expected Bot MSI Resource ID: $EXPECTED_BOT_MSI_RESOURCE_ID"
          echo "Current  Bot MSI Resource ID: $CURRENT_BOT_MSI_RESOURCE_ID"

          if [ "$CURRENT_ENDPOINT" != "$EXPECTED_ENDPOINT" ] || \
             [ "$CURRENT_BOT_APP_ID" != "$EXPECTED_BOT_APP_ID" ] || \
             [ "$CURRENT_BOT_MSI_RESOURCE_ID" != "$EXPECTED_BOT_MSI_RESOURCE_ID" ]; then
            echo "⚠️ Bot Service drift detected — repairing endpoint and identity..."
            az rest --method PATCH \
              --url "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.BotService/botServices/$BOT_NAME?api-version=2022-09-15" \
              --body "{\"properties\":{\"endpoint\":\"$EXPECTED_ENDPOINT\",\"msaAppId\":\"$EXPECTED_BOT_APP_ID\",\"msaAppType\":\"UserAssignedMSI\",\"msaAppMSIResourceId\":\"$EXPECTED_BOT_MSI_RESOURCE_ID\",\"msaAppTenantId\":\"${{ vars.AZURE_TENANT_ID }}\"}}" || \
              echo "⚠️ Failed to repair Bot Service identity/endpoint — may need manual fix"
            echo "✅ Bot Service endpoint/identity repair attempted"
          else
            echo "✅ Bot Service endpoint and identity are correct"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Deployment Report
  # ─────────────────────────────────────────────────────────────────────────
  deployment-report:
    name: "📊 Deployment Report"
    needs: [deploy-infra, build-and-push, deploy-app]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Generate deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🚀 HelkinSwarm Stamp Deployment — \`${{ env.USER_ALIAS }}\`

          | Property | Value |
          |----------|-------|
          | **User Alias** | \`${{ env.USER_ALIAS }}\` |
          | **Resource Group** | \`${{ env.RESOURCE_GROUP }}\` |
          | **Function App** | \`${{ needs.deploy-infra.outputs.function-app-name }}\` |
          | **FQDN** | \`${{ needs.deploy-app.outputs.fqdn }}\` |
          | **Health Endpoint** | \`https://${{ needs.deploy-app.outputs.fqdn }}/api/health\` |
          | **Bot Endpoint** | \`https://${{ needs.deploy-app.outputs.fqdn }}/api/messages\` |
          | **ACR** | \`${{ needs.deploy-infra.outputs.acr-login-server }}\` |
          | **Image Tag** | \`${{ github.sha }}\` |
          | **EU Residency** | \`${{ github.event.inputs.EU_RESIDENCY_MODE }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Triggered by** | \`${{ github.actor }}\` |
          | **Timestamp** | \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\` |
          EOF
