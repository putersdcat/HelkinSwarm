# ============================================================================
# HelkinSwarm — quota-optimize.yml: AI Foundry capacity audit + rebalance hints
# Manual/scheduled quota visibility workflow for stamped deployments.
# Spec ref: #113, docs/12-Deployment-CICD.md
# ============================================================================

name: Quota Optimize

on:
  workflow_dispatch:
    inputs:
      USER_ALIAS:
        description: "4-char alphanumeric user alias (e.g. a7f2). Used when SWEEP_ALL_STAMPS=false."
        required: false
        type: string
      SWEEP_ALL_STAMPS:
        description: "Audit all enabled aliases from config/user-map.json instead of a single stamp."
        required: false
        type: boolean
        default: false
      AUTO_APPLY_RECOMMENDATIONS:
        description: "Dispatch deploy-stamp.yml for aliases with generated override recommendations."
        required: false
        type: boolean
        default: false
      REPORT_ISSUE_NUMBER:
        description: "Optional GitHub issue number to receive a workflow summary comment."
        required: false
        type: string
      LOW_CAPACITY_THRESHOLD:
        description: "Flag deployments at or below this 1k TPM capacity as floor-pinned."
        required: false
        type: number
        default: 1
      RECOMMENDED_FLOOR_CAPACITY:
        description: "Suggested replacement capacity (1k TPM units) for floor-pinned deployments in the generated override snippet."
        required: false
        type: number
        default: 5
  schedule:
    - cron: '17 12 * * 1'

permissions:
  actions: write
  id-token: write
  contents: read
  issues: write

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  USER_ALIAS: ${{ github.event.inputs.USER_ALIAS || vars.USER_ALIAS }}

jobs:
  quota-audit:
    name: Audit AI Foundry Quota
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        run: |
          SWEEP_ALL="${{ github.event.inputs.SWEEP_ALL_STAMPS || 'false' }}"
          ALIAS="${{ env.USER_ALIAS }}"

          if [ "$SWEEP_ALL" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "✅ Multi-stamp sweep selected — USER_ALIAS validation skipped"
            exit 0
          fi

          if ! echo "$ALIAS" | grep -qE '^[a-z0-9]{4}$'; then
            echo "❌ USER_ALIAS must be exactly 4 lowercase alphanumeric characters when SWEEP_ALL_STAMPS=false. Got: '$ALIAS'"
            exit 1
          fi

          echo "✅ USER_ALIAS '$ALIAS' is valid"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Audit quota and generate recommendations
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $sweepAll = '${{ github.event.inputs.SWEEP_ALL_STAMPS || 'false' }}' -eq 'true' -or '${{ github.event_name }}' -eq 'schedule'
          $autoApply = '${{ github.event.inputs.AUTO_APPLY_RECOMMENDATIONS || 'false' }}' -eq 'true'
          $threshold = [int]${{ github.event.inputs.LOW_CAPACITY_THRESHOLD || 1 }}
          $recommendedFloor = [int]${{ github.event.inputs.RECOMMENDED_FLOOR_CAPACITY || 5 }}
          $outputRoot = Join-Path $PWD 'quota-output'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $summaryMarkdownPath = Join-Path $outputRoot 'quota-summary.md'

          if ($sweepAll) {
            $userMap = Get-Content -Path (Join-Path $PWD 'config/user-map.json') -Raw | ConvertFrom-Json
            $aliases = @($userMap.users.PSObject.Properties.Value | Where-Object { $_.enabled -eq $true } | ForEach-Object { $_.alias } | Sort-Object -Unique)
          } else {
            $aliases = @('${{ env.USER_ALIAS }}')
          }

          if ($aliases.Count -eq 0) {
            throw 'No enabled aliases found for quota audit sweep.'
          }

          $summaryLines = @(
            '## AI Foundry Quota Audit',
            '',
            "- Sweep all stamps: $sweepAll",
            "- Auto-apply recommendations: $autoApply",
            "- Alias count: $($aliases.Count)",
            "- Low-capacity threshold: $threshold",
            "- Suggested floor capacity for overrides: $recommendedFloor"
          )

          foreach ($alias in $aliases) {
            $resourceGroupName = "rg-helkinswarm-$alias"
            $result = & "$PWD/scripts/Invoke-AzFoundryQuotaAudit.ps1" `
              -UserAlias $alias `
              -ResourceGroupName $resourceGroupName `
              -LowCapacityThreshold $threshold `
              -RecommendedFloorCapacity $recommendedFloor `
              -OutputFormat Json | ConvertFrom-Json

            $aliasDir = Join-Path $outputRoot $alias
            New-Item -ItemType Directory -Path $aliasDir -Force | Out-Null

            $summaryPath = Join-Path $aliasDir 'quota-audit.json'
            $result | ConvertTo-Json -Depth 8 | Set-Content -Path $summaryPath -Encoding UTF8
            $overridesPath = Join-Path $aliasDir 'quota-overrides.json'
            $overrideJson = $result.recommendations.modelQuotaOverrides | ConvertTo-Json -Compress -Depth 5
            $overrideJson | Set-Content -Path $overridesPath -Encoding UTF8
            $fullOverridesPath = Join-Path $aliasDir 'quota-overrides-full.json'
            $fullOverrideJson = $result.recommendations.fullModelQuotaOverrides | ConvertTo-Json -Compress -Depth 5
            $fullOverrideJson | Set-Content -Path $fullOverridesPath -Encoding UTF8

            $rows = @($result.deployments | Sort-Object DeploymentName)
            $low = @($result.summary.lowCapacityDeployments)

            $summaryLines += ''
            $summaryLines += "### Alias $alias"
            $summaryLines += "- AI Services: $($result.summary.aiServicesName)"
            $summaryLines += "- Total requested capacity: $($result.summary.totalRequestedCapacity) (1k TPM units)"
            $summaryLines += "- Floor-pinned count: $($low.Count)"
            $summaryLines += ''
            $summaryLines += '| Deployment | SKU | Capacity | Model | State |'
            $summaryLines += '|---|---|---:|---|---|'

            foreach ($row in $rows) {
              $summaryLines += "| $($row.DeploymentName) | $($row.SkuName) | $($row.Capacity) | $($row.ModelName) | $($row.ProvisioningState) |"
            }

            if ($low.Count -gt 0) {
              $summaryLines += ''
              $summaryLines += '#### Floor-pinned deployments'
              foreach ($row in $low) {
                $summaryLines += "- $($row.DeploymentName) at $($row.Capacity)k TPM"
              }
              $summaryLines += ''
              $summaryLines += '#### Suggested modelQuotaOverrides snippet'
              $summaryLines += '```json'
              $summaryLines += (Get-Content -Path $overridesPath -Raw).TrimEnd()
              $summaryLines += '```'

              if ($autoApply) {
                gh workflow run deploy-stamp.yml `
                  -f USER_ALIAS=$alias `
                  -f QUOTA_STRATEGY=manual `
                  -f QUOTA_MAX_TPM_CEILING=200000 `
                  -f MODEL_QUOTA_OVERRIDES_JSON=$fullOverrideJson `
                  -f EU_RESIDENCY_MODE=false `
                  -f CREATE_OAUTH_CONNECTION=false | Out-Null

                $summaryLines += ''
                $summaryLines += "#### Auto-apply dispatch"
                $summaryLines += "- Dispatched deploy-stamp.yml for $alias using generated overrides."
                Write-Host "[$alias] Dispatched deploy-stamp.yml with generated overrides."
              }

              Write-Host "[$alias] Found $($low.Count) deployment(s) at or below ${threshold}k TPM."
            } else {
              $summaryLines += ''
              $summaryLines += 'No deployments are currently pinned at or below the configured floor.'
              Write-Host "[$alias] No deployments are pinned at or below ${threshold}k TPM."
            }
          }

          $summaryLines | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          $summaryLines | Set-Content -Path $summaryMarkdownPath -Encoding UTF8

      - name: Upload quota audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quota-audit-${{ github.run_id }}
          path: quota-output/**

      - name: Comment summary to issue
        if: ${{ github.event.inputs.REPORT_ISSUE_NUMBER != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $issueNumber = '${{ github.event.inputs.REPORT_ISSUE_NUMBER }}'
          $summaryMarkdownPath = Join-Path $PWD 'quota-output/quota-summary.md'

          if (-not (Test-Path -Path $summaryMarkdownPath)) {
            throw "Expected summary markdown at $summaryMarkdownPath but it was not created."
          }

          $header = @(
            "Automated quota maintenance summary from workflow run ${{ github.run_id }}.",
            '',
            "Workflow: ${{ github.workflow }}",
            "Ref: ${{ github.ref_name }}",
            ''
          ) -join "`n"

          $body = $header + (Get-Content -Path $summaryMarkdownPath -Raw)
          gh issue comment $issueNumber --body $body
