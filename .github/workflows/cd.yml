# ============================================================================
# HelkinSwarm — CD: Deploy infra + container on push to main
# Bicep → ACR build → Container Apps rollout → Bot endpoint verify
# ⚠️ MARK FOR IMMEDIATE REFACTOR before first run in v2.
# Reference implementation only — alpha issue refs stripped.
# ============================================================================

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress CD runs for the same branch to prevent ARM DeploymentActive
# conflicts when multiple pushes arrive in rapid succession.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  USER_PRINCIPAL_ID: ${{ vars.USER_PRINCIPAL_ID }}

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      acr-login-server: ${{ steps.bicep.outputs.acrLoginServer }}
      acr-name: ${{ steps.bicep.outputs.acrName }}
      function-app-name: ${{ steps.bicep.outputs.functionAppName }}
      managed-identity-client-id: ${{ steps.bicep.outputs.managedIdentityClientId }}
      managed-identity-resource-id: ${{ steps.bicep.outputs.managedIdentityResourceId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------------------------------------------------------
      # Pre-deploy: remove orphaned UAMI role assignments so Bicep can
      # recreate them with deterministic GUIDs. Without this step, partial
      # failures leave role assignments with different GUIDs, causing
      # RoleAssignmentExists on subsequent deploys.
      # ---------------------------------------------------------------------------
      - name: Reset UAMI role assignments (idempotency pre-check)
        run: |
          set +e
          echo "🔍 Looking up UAMI principal ID..."
          UAMI_PRINCIPAL_ID=$(az identity show \
            --name "helkinswarm-id-prod-eus2" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --query principalId -o tsv 2>/dev/null || echo "")

          if [ -z "$UAMI_PRINCIPAL_ID" ]; then
            echo "ℹ️  UAMI not yet provisioned — skipping role assignment cleanup (first deploy)"
            exit 0
          fi

          echo "🧹 Removing ARM role assignments for UAMI $UAMI_PRINCIPAL_ID (Bicep will recreate)"
          ASSIGNMENT_IDS=$(az role assignment list \
            --assignee "$UAMI_PRINCIPAL_ID" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --query "[].id" -o tsv 2>/dev/null || echo "")

          if [ -n "$ASSIGNMENT_IDS" ]; then
            echo "$ASSIGNMENT_IDS" | tr '\t' '\n' | while read -r ASSIGNMENT_ID; do
              [ -n "$ASSIGNMENT_ID" ] && \
                az role assignment delete --ids "$ASSIGNMENT_ID" 2>/dev/null || true
            done
            echo "✅ ARM role assignments cleared"
          else
            echo "ℹ️  No ARM role assignments found for UAMI"
          fi

          # NOTE: Cosmos DB SQL role assignments are NOT cleared here.
          # Bicep uses deterministic GUIDs for Cosmos SQL role assignments,
          # and the Microsoft.DocumentDB sqlRoleAssignments resource type
          # supports idempotent createOrUpdate. Clearing them causes a
          # propagation delay during which the app loses Cosmos access.

      - name: Deploy Bicep
        id: bicep
        run: |
          set +e

          echo "🚀 Deploying Bicep (incremental mode)..."
          DEPLOY_OUT=$(az deployment group create \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.parameters.json" userPrincipalId="${{ vars.USER_PRINCIPAL_ID }}" alertEmail="${{ vars.ALERT_EMAIL }}" \
            --output json 2>&1)
          DEPLOY_EXIT=$?

          if [ $DEPLOY_EXIT -ne 0 ]; then
            # RoleAssignmentExists = the assignment already exists with correct permissions
            ROLE_EXISTS=$(echo "$DEPLOY_OUT" | grep -c '"RoleAssignmentExists"' || true)
            REAL_ERRORS=$(echo "$DEPLOY_OUT" | grep '"code"' \
              | grep -v '"RoleAssignmentExists"' \
              | grep -v '"DeploymentFailed"' \
              | wc -l)

            if [ "$ROLE_EXISTS" -gt 0 ] && [ "$REAL_ERRORS" -eq 0 ]; then
              echo "⚠️  RoleAssignmentExists: role assignments already provisioned with correct permissions."
              echo "    Continuing — Bicep will converge on next clean deploy."
            else
              echo "❌ Deployment failed with unexpected errors:"
              echo "$DEPLOY_OUT"
              exit 1
            fi
          fi

          echo "📦 Querying resources directly (more reliable than ARM outputs on partial failure)..."

          ACR_INFO=$(az acr list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --query "[0]" --output json 2>/dev/null || echo '{}')

          FUNC_INFO=$(az functionapp list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --query "[0]" --output json 2>/dev/null || echo '{}')

          UAMI_INFO=$(az identity show \
            --name "helkinswarm-id-prod-eus2" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --output json 2>/dev/null || echo '{}')

          ACR_LOGIN=$(echo "$ACR_INFO" | jq -r '.loginServer // ""')
          ACR_NAME=$(echo "$ACR_INFO" | jq -r '.name // ""')
          FUNC_NAME=$(echo "$FUNC_INFO" | jq -r '.name // ""')
          MI_CLIENT_ID=$(echo "$UAMI_INFO" | jq -r '.clientId // ""')
          MI_RESOURCE_ID=$(echo "$UAMI_INFO" | jq -r '.id // ""')

          echo "  ACR: $ACR_NAME ($ACR_LOGIN)"
          echo "  Function App: $FUNC_NAME"
          echo "  UAMI Client ID: $MI_CLIENT_ID"

          if [ -z "$ACR_NAME" ] || [ -z "$FUNC_NAME" ]; then
            echo "❌ ERROR: ACR or Function App not found in resource group ${{ vars.AZURE_RESOURCE_GROUP }}."
            exit 1
          fi

          echo "acrLoginServer=$ACR_LOGIN"       >> "$GITHUB_OUTPUT"
          echo "acrName=$ACR_NAME"               >> "$GITHUB_OUTPUT"
          echo "functionAppName=$FUNC_NAME"      >> "$GITHUB_OUTPUT"
          echo "managedIdentityClientId=$MI_CLIENT_ID"   >> "$GITHUB_OUTPUT"
          echo "managedIdentityResourceId=$MI_RESOURCE_ID" >> "$GITHUB_OUTPUT"

          echo "✅ Deploy step complete."

  build-and-push:
    name: Build & Push Container
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ needs.deploy-infra.outputs.acr-name }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm:${{ github.sha }}
          IMAGE_LATEST=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm:latest
          docker build -t $IMAGE -t $IMAGE_LATEST .
          docker push $IMAGE
          docker push $IMAGE_LATEST

  deploy-app:
    name: Deploy to Container Apps
    needs: [deploy-infra, build-and-push]
    runs-on: ubuntu-latest
    outputs:
      fqdn: ${{ steps.verify.outputs.fqdn }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Function App container image
        run: |
          FUNC_NAME=${{ needs.deploy-infra.outputs.function-app-name }}
          ACR_SERVER=${{ needs.deploy-infra.outputs.acr-login-server }}
          MI_RESOURCE_ID=${{ needs.deploy-infra.outputs.managed-identity-resource-id }}
          IMAGE_TAG=${{ github.sha }}

          # Step 1: Update DOCKER_REGISTRY_SERVER_URL app setting to point to ACR
          az functionapp config appsettings set \
            --name "${FUNC_NAME}" \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --settings DOCKER_REGISTRY_SERVER_URL="${ACR_SERVER}"

          # Step 2: Set ACR managed identity auth + switch to ACR container image
          az rest --method PATCH \
            --url "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${FUNC_NAME}?api-version=2023-12-01" \
            --body "{\"properties\":{\"siteConfig\":{\"linuxFxVersion\":\"DOCKER|${ACR_SERVER}/helkinswarm:${IMAGE_TAG}\",\"acrUseManagedIdentityCreds\":true,\"acrUserManagedIdentityID\":\"${MI_RESOURCE_ID}\"}}}"

      - name: Verify deployment
        id: verify
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30
          HOSTNAME=$(az functionapp show \
            --name ${{ needs.deploy-infra.outputs.function-app-name }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv 2>/dev/null || echo "")
          if [ -z "$HOSTNAME" ]; then
            # ACA-hosted Functions: derive FQDN from Container Apps Environment
            CAE_DOMAIN=$(az containerapp env list \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
              --query "[0].properties.defaultDomain" -o tsv 2>/dev/null || echo "")
            HOSTNAME="${{ needs.deploy-infra.outputs.function-app-name }}.${CAE_DOMAIN}"
          fi
          echo "Function App hostname: $HOSTNAME"
          echo "fqdn=$HOSTNAME" >> "$GITHUB_OUTPUT"
          # Health check (may fail on first deploy before image is ready)
          curl -sf "https://$HOSTNAME/api/health" || echo "⏳ Health check pending — first deploy may take a few minutes"

      - name: Verify Bot Service endpoint
        run: |
          EXPECTED_ENDPOINT="https://${{ steps.verify.outputs.fqdn }}/api/messages"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          SUB="${{ vars.AZURE_SUBSCRIPTION_ID }}"

          BOT_NAME=$(az resource list \
            --resource-group "$RG" --subscription "$SUB" \
            --resource-type "Microsoft.BotService/botServices" \
            --query "[0].name" -o tsv 2>/dev/null || echo "")

          if [ -z "$BOT_NAME" ]; then
            echo "⚠️ No Bot Service found in resource group $RG — skipping endpoint verification"
            exit 0
          fi
          echo "Discovered Bot Service: $BOT_NAME"

          CURRENT_ENDPOINT=$(az bot show \
            --name "$BOT_NAME" \
            --resource-group "$RG" \
            --subscription "$SUB" \
            --query "properties.endpoint" -o tsv 2>/dev/null || echo "")

          echo "Expected Bot endpoint: $EXPECTED_ENDPOINT"
          echo "Current Bot endpoint:  $CURRENT_ENDPOINT"

          if [ "$CURRENT_ENDPOINT" != "$EXPECTED_ENDPOINT" ]; then
            echo "⚠️ Bot Service endpoint mismatch! Updating..."
            az bot update \
              --name "$BOT_NAME" \
              --resource-group "$RG" \
              --subscription "$SUB" \
              --endpoint "$EXPECTED_ENDPOINT" 2>/dev/null || \
            az rest --method PATCH \
              --url "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.BotService/botServices/$BOT_NAME?api-version=2022-09-15" \
              --body "{\"properties\":{\"endpoint\":\"$EXPECTED_ENDPOINT\"}}"
            echo "✅ Bot Service endpoint updated to: $EXPECTED_ENDPOINT"
          else
            echo "✅ Bot Service endpoint is correct"
          fi

  # ============================================================================
  # Post-deploy: write a rich Markdown summary to the GitHub Actions job page.
  # ============================================================================
  deployment-report:
    name: "📊 Deployment Report"
    needs: [deploy-infra, build-and-push, deploy-app]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Generate deployment report
        env:
          FQDN:        ${{ needs.deploy-app.outputs.fqdn }}
          FUNC_NAME:   ${{ needs.deploy-infra.outputs.function-app-name }}
          ACR_SERVER:  ${{ needs.deploy-infra.outputs.acr-login-server }}
          RG:          ${{ vars.AZURE_RESOURCE_GROUP }}
          SUB:         ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TENANT:      ${{ vars.AZURE_TENANT_ID }}
          SHA:         ${{ github.sha }}
          REF:         ${{ github.ref_name }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')

          echo "🔍 Querying infrastructure..."

          COSMOS_ACCOUNT=$(az cosmosdb list \
            --resource-group "$RG" --subscription "$SUB" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          KV_NAME=$(az keyvault list \
            --resource-group "$RG" --subscription "$SUB" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          AI_NAME=$(az cognitiveservices account list \
            --resource-group "$RG" --subscription "$SUB" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          AI_ENDPOINT=$(az cognitiveservices account list \
            --resource-group "$RG" --subscription "$SUB" \
            --query "[0].properties.endpoint" -o tsv 2>/dev/null || echo "—")

          APP_INSIGHTS=$(az resource list \
            --resource-group "$RG" --subscription "$SUB" \
            --resource-type "microsoft.insights/components" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          CAE_NAME=$(az containerapp env list \
            --resource-group "$RG" --subscription "$SUB" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          BOT_NAME=$(az resource list \
            --resource-group "$RG" --subscription "$SUB" \
            --resource-type "Microsoft.BotService/botServices" \
            --query "[0].name" -o tsv 2>/dev/null || echo "—")

          HEALTH_STATUS="⏳ cold-start"
          if curl -sf --max-time 15 "https://${FQDN}/api/health" > /dev/null 2>&1; then
            HEALTH_STATUS="✅ healthy"
          fi

          PORTAL_RG="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/overview"
          PORTAL_COST="https://portal.azure.com/#@${TENANT}/blade/Microsoft_Azure_CostManagement/Menu/costanalysis/scope/%2Fsubscriptions%2F${SUB}%2FresourceGroups%2F${RG}"
          PORTAL_AI="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/providers/microsoft.insights/components/${APP_INSIGHTS}/overview"
          PORTAL_KV="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.KeyVault/vaults/${KV_NAME}/overview"
          PORTAL_BOT="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.BotService/botServices/${BOT_NAME}/overview"
          PORTAL_COSMOS="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DocumentDB/databaseAccounts/${COSMOS_ACCOUNT}/overview"
          PORTAL_ACR="https://portal.azure.com/#@${TENANT}/resource/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerRegistry/registries/${ACR_SERVER%%.*}/overview"

          {
            echo "# HelkinSwarm 🤖 — Deployment Complete"
            echo ""
            echo "> **Commit:** [\`${SHORT_SHA}\`](https://github.com/putersdcat/HelkinSwarm/commit/${SHA}) · **Branch:** \`${REF}\` · **${TS}**"
            echo ""
            echo "## 🌐 Live Endpoints"
            echo ""
            echo "| Endpoint | URL | Status |"
            echo "|---|---|---|"
            echo "| Health | \`https://${FQDN}/api/health\` | ${HEALTH_STATUS} |"
            echo "| Bot Messages | \`https://${FQDN}/api/messages\` | 🤖 active |"
            echo ""
            echo "## 📦 Infrastructure"
            echo ""
            echo "| Resource | Name | Portal |"
            echo "|---|---|---|"
            echo "| Function App | \`${FUNC_NAME}\` | [open](${PORTAL_RG}) |"
            echo "| Container Apps Env | \`${CAE_NAME}\` | [open](${PORTAL_RG}) |"
            echo "| Container Registry | \`${ACR_SERVER}\` | [open](${PORTAL_ACR}) |"
            echo "| Cosmos DB | \`${COSMOS_ACCOUNT}\` | [open](${PORTAL_COSMOS}) |"
            echo "| AI Services | \`${AI_NAME}\` | [open](${PORTAL_RG}) |"
            echo "| AI Endpoint | \`${AI_ENDPOINT}\` | — |"
            echo "| Key Vault | \`${KV_NAME}\` | [open](${PORTAL_KV}) |"
            echo "| App Insights | \`${APP_INSIGHTS}\` | [open](${PORTAL_AI}) |"
            echo "| Bot Service | \`${BOT_NAME}\` | [open](${PORTAL_BOT}) |"
            echo ""
            echo "## 🐳 Container Image"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| SHA tag | \`${ACR_SERVER}/helkinswarm:${SHA}\` |"
            echo "| latest tag | \`${ACR_SERVER}/helkinswarm:latest\` |"
            echo ""
            echo "## 🔗 Portal Links"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 📁 Resource Group | [${RG}](${PORTAL_RG}) |"
            echo "| 💰 Cost Analysis | [Cost Management](${PORTAL_COST}) |"
            echo "| 📈 Application Insights | [Live Metrics & Logs](${PORTAL_AI}) |"
            echo "| 🔑 Key Vault | [${KV_NAME}](${PORTAL_KV}) |"
            echo "| 🤖 Bot Service | [Teams Channel Config](${PORTAL_BOT}) |"
            echo ""
            echo "## 🗒️ Quick-test Commands"
            echo ""
            echo '```powershell'
            echo "# Health"
            echo "Invoke-RestMethod https://${FQDN}/api/health"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  HelkinSwarm 🤖 deployed — ${TS}"
          echo "════════════════════════════════════════════════════════"
          echo "  Health:  https://${FQDN}/api/health   → ${HEALTH_STATUS}"
          echo "  Bot:     https://${FQDN}/api/messages"
          echo "────────────────────────────────────────────────────────"
