# ============================================================================
# HelkinSwarm — deploy-router.yml: Global Router Deployment
# Deploys the single global Teams router that sits in front of all stamps.
# Routes by activity.from.aadObjectId → user-map.json → stamp endpoint.
#
# Resource group: rg-helkinswarm-router
# Spec ref: 0q-Multi-Instance-Architecture.md
# ============================================================================

name: Deploy Router

on:
  workflow_dispatch:
    inputs:
      CREATE_OAUTH_CONNECTION:
        description: 'Create/update the GraphOAuth Bot Service connection on the router bot'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      LOW_COST_DEV_MODE:
        description: 'Enable Low Cost Dev Mode: 0.1 GB/day Log Analytics ingestion cap, minimal App Insights sampling. (#303)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-router
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: "rg-helkinswarm-router"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Deploy Infrastructure (Bicep)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Router Infra
    runs-on: ubuntu-latest
    outputs:
      router-endpoint: ${{ steps.deploy.outputs.routerEndpoint }}
      router-hostname: ${{ steps.deploy.outputs.routerHostName }}
      function-app-name: ${{ steps.deploy.outputs.routerFunctionAppName }}
      acr-name: ${{ steps.deploy.outputs.routerAcrName }}
      acr-login-server: ${{ steps.deploy.outputs.routerAcrLoginServer }}
      router-uami-client-id: ${{ steps.deploy.outputs.routerUamiClientId }}
      router-uami-resource-id: ${{ steps.deploy.outputs.routerUamiResourceId }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location eastus2 \
            --tags \
              "project=HelkinSwarm" \
              "component=router" \
              "env=global" \
              "repo=putersdcat/HelkinSwarm" \
              "owner=putersdcat" \
              "managedBy=deploy-router.yml" \
              "deployedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Migrate — remove legacy Microsoft.Web/sites router if it exists
        continue-on-error: true
        run: |
          # One-time migration: the router was previously a Microsoft.Web/sites resource.
          # The Bicep now uses Microsoft.App/containerApps. Both resource types use the same
          # app name (helkinswarm-router) which would conflict in the CAE FQDN.
          # Safely delete the old resource if it still exists. (#235)
          LEGACY_EXISTS=$(az webapp show \
            --name helkinswarm-router \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$LEGACY_EXISTS" ]; then
            echo "🗑️  Deleting legacy Microsoft.Web/sites router: $LEGACY_EXISTS"
            az webapp delete \
              --name helkinswarm-router \
              --resource-group "${{ env.RESOURCE_GROUP }}"
            echo "✅ Legacy resource deleted. New Container App will be created by Bicep."
          else
            echo "✅ No legacy Microsoft.Web/sites router found. Nothing to migrate."
          fi

      - name: Deploy Bicep
        id: deploy
        run: |
          # Read DelegatedAuth client secret from stamp KV if creating OAuth connection
          OAUTH_SECRET=""
          if [ "${{ github.event.inputs.CREATE_OAUTH_CONNECTION }}" = "true" ]; then
            OAUTH_SECRET=$(az keyvault secret show --vault-name helkinswarm-kv-a7f2 --name DelegatedAuthClientSecret --query value -o tsv)
          fi
          RESULT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main-router.bicep \
            --parameters \
              userPrincipalId=${{ vars.USER_PRINCIPAL_ID }} \
              createOAuthConnection=${{ github.event.inputs.CREATE_OAUTH_CONNECTION || 'false' }} \
              delegatedAuthClientSecret="$OAUTH_SECRET" \
              lowCostDevMode=${{ github.event.inputs.LOW_COST_DEV_MODE || 'false' }} \
            --query 'properties.outputs' -o json)
          echo "routerEndpoint=$(echo $RESULT | jq -r '.routerEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "routerHostName=$(echo $RESULT | jq -r '.routerHostName.value')" >> "$GITHUB_OUTPUT"
          echo "routerFunctionAppName=$(echo $RESULT | jq -r '.routerFunctionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "routerAcrName=$(echo $RESULT | jq -r '.routerAcrName.value')" >> "$GITHUB_OUTPUT"
          echo "routerAcrLoginServer=$(echo $RESULT | jq -r '.routerAcrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "routerUamiClientId=$(echo $RESULT | jq -r '.routerUamiClientId.value')" >> "$GITHUB_OUTPUT"
          echo "routerUamiResourceId=$(echo $RESULT | jq -r '.routerUamiResourceId.value')" >> "$GITHUB_OUTPUT"
      - name: Register global bot identity as GitHub variables
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh variable set BOT_APP_ID --body "${{ steps.deploy.outputs.routerUamiClientId }}"
          gh variable set ROUTER_UAMI_ID --body "${{ steps.deploy.outputs.routerUamiResourceId }}"
          echo "✅ BOT_APP_ID set to router UAMI client ID: ${{ steps.deploy.outputs.routerUamiClientId }}"
          echo "✅ ROUTER_UAMI_ID set to router UAMI resource ID: ${{ steps.deploy.outputs.routerUamiResourceId }}"
  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build & Push Container Image to Router ACR
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Router Image
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Router ACR
        run: az acr login --name ${{ needs.deploy-infra.outputs.acr-name }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm-router:${{ github.sha }}
          IMAGE_LATEST=${{ needs.deploy-infra.outputs.acr-login-server }}/helkinswarm-router:latest
          # Disable BuildKit to avoid cache key errors with newly-added directories
          DOCKER_BUILDKIT=0 docker build -f Dockerfile.router -t $IMAGE -t $IMAGE_LATEST .
          DOCKER_BUILDKIT=0 docker push $IMAGE
          DOCKER_BUILDKIT=0 docker push $IMAGE_LATEST

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Deploy Router Image to Container Apps Function App
  # ─────────────────────────────────────────────────────────────────────────
  deploy-code:
    name: Deploy Router to Container Apps
    needs: [deploy-infra, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Function App container image
        run: |
          FUNC_NAME=${{ needs.deploy-infra.outputs.function-app-name }}
          ACR_SERVER=${{ needs.deploy-infra.outputs.acr-login-server }}
          IMAGE_TAG=${{ github.sha }}
          REVISION_SUFFIX="r${IMAGE_TAG:0:8}"

          # Log current revision for rollback reference
          CURRENT=$(az containerapp show \
            --name "${FUNC_NAME}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "unknown")
          echo "Current revision: $CURRENT"
          echo "New revision suffix: $REVISION_SUFFIX"

          # Deploy new revision via Container Apps native revision management.
          # Single-revision mode: platform keeps old revision serving until new one is ready.
          # This replaces the az rest PATCH approach that caused downtime (#235).
          az containerapp update \
            --name "${FUNC_NAME}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${ACR_SERVER}/helkinswarm-router:${IMAGE_TAG}" \
            --revision-suffix "${REVISION_SUFFIX}"

          echo "✅ Revision ${FUNC_NAME}--${REVISION_SUFFIX} submitted. Platform will manage traffic cutover."

      - name: Verify health
        run: |
          echo "⏳ Waiting for new revision to start (90s — Container Apps revision warmup)..."
          sleep 90

          # Get stable ingress FQDN from Container Apps (not az functionapp — resource type changed to Microsoft.App)
          HOSTNAME=$(az containerapp show \
            --name ${{ needs.deploy-infra.outputs.function-app-name }} \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")

          if [ -z "$HOSTNAME" ]; then
            echo "⚠️  Could not resolve hostname from Container App ingress. Using deploy-infra output hostname."
            HOSTNAME="${{ needs.deploy-infra.outputs.router-hostname }}"
          fi

          echo "🏥 Router health: https://${HOSTNAME}/api/health"

          MAX_RETRIES=8
          RETRY=0
          HEALTHY=false
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOSTNAME/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Router health OK (HTTP $HTTP_CODE)"
              HEALTHY=true
              break
            fi
            RETRY=$((RETRY + 1))
            echo "⏳ Attempt $RETRY/$MAX_RETRIES: HTTP $HTTP_CODE — retrying in 30s..."
            sleep 30
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "❌ Router health check failed after $((90 + MAX_RETRIES * 30))s"
            echo "⚠️  Router may be experiencing downtime. Check Application Insights for errors."
            exit 1
          fi

          # Additional warmup: do a second health request 10s later to confirm stability
          sleep 10
          HTTP_CODE2=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOSTNAME/api/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE2" != "200" ]; then
            echo "⚠️  Router health unstable after warmup (HTTP $HTTP_CODE2)"
            exit 1
          fi
          echo "✅ Router warmup confirmed stable"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Deployment Report
  # ─────────────────────────────────────────────────────────────────────────
  report:
    name: Deployment Report
    needs: [deploy-infra, build-and-push, deploy-code]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo " HelkinSwarm Router Deployment Report"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Infra:  ${{ needs.deploy-infra.result }}"
          echo "Image:  ${{ needs.build-and-push.result }}"
          echo "Code:   ${{ needs.deploy-code.result }}"
          echo ""
          echo "Router Endpoint:      ${{ needs.deploy-infra.outputs.router-endpoint }}"
          echo "Function App:         ${{ needs.deploy-infra.outputs.function-app-name }}"
          echo "Router UAMI ClientId: ${{ needs.deploy-infra.outputs.router-uami-client-id }}"
          echo "═══════════════════════════════════════════════"
