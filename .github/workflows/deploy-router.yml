# ============================================================================
# HelkinSwarm — deploy-router.yml: Global Router Deployment
# Deploys the single global Teams router that sits in front of all stamps.
# Routes by activity.from.aadObjectId → user-map.json → stamp endpoint.
#
# Resource group: rg-helkinswarm-router
# Spec ref: 0q-Multi-Instance-Architecture.md
# ============================================================================

name: Deploy Router

on:
  workflow_dispatch:

concurrency:
  group: deploy-router
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: "rg-helkinswarm-router"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Deploy Infrastructure (Bicep)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Router Infra
    runs-on: ubuntu-latest
    outputs:
      router-endpoint: ${{ steps.deploy.outputs.routerEndpoint }}
      router-hostname: ${{ steps.deploy.outputs.routerHostName }}
      function-app-name: ${{ steps.deploy.outputs.routerFunctionAppName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location eastus2

      - name: Deploy Bicep
        id: deploy
        run: |
          RESULT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main-router.bicep \
            --parameters \
              botAppId=${{ vars.BOT_APP_ID }} \
              tenantId=${{ vars.AZURE_TENANT_ID }} \
            --query 'properties.outputs' -o json)
          echo "routerEndpoint=$(echo $RESULT | jq -r '.routerEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "routerHostName=$(echo $RESULT | jq -r '.routerHostName.value')" >> "$GITHUB_OUTPUT"
          echo "routerFunctionAppName=$(echo $RESULT | jq -r '.routerFunctionAppName.value')" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build & Deploy Router Code
  # ─────────────────────────────────────────────────────────────────────────
  deploy-code:
    name: Build & Deploy Router
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Package router function
        run: |
          mkdir -p router-deploy
          # Copy compiled router code
          cp -r dist/src/router/* router-deploy/
          # Copy config (user-map.json)
          mkdir -p router-deploy/config
          cp config/user-map.json router-deploy/config/
          # Copy package files for production deps
          cp package.json pnpm-lock.yaml router-deploy/
          cd router-deploy
          pnpm install --prod --frozen-lockfile

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infra.outputs.function-app-name }}
          package: router-deploy

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Deployment Report
  # ─────────────────────────────────────────────────────────────────────────
  report:
    name: Deployment Report
    needs: [deploy-infra, deploy-code]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo " HelkinSwarm Router Deployment Report"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Infra:  ${{ needs.deploy-infra.result }}"
          echo "Code:   ${{ needs.deploy-code.result }}"
          echo ""
          echo "Router Endpoint: ${{ needs.deploy-infra.outputs.router-endpoint }}"
          echo "Function App:    ${{ needs.deploy-infra.outputs.function-app-name }}"
          echo "═══════════════════════════════════════════════"
