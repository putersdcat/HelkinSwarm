# ============================================================================
# HelkinSwarm — deploy-tabs.yml: Global Tab SPA Host Deployment
#
# Deploys the Azure Storage static website that hosts the global tab SPA.
# Resource group: rg-helkinswarm-tabs
# Storage account: helkinswarmtabsst
# ============================================================================

name: Deploy Tab Host

on:
  workflow_dispatch:
  push:
    paths:
      - 'tabs/**'
      - 'config/user-map.json'
      - 'infra/main-tabs.bicep'
      - '.github/workflows/deploy-tabs.yml'
    branches:
      - main

concurrency:
  group: deploy-tabs
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: 'rg-helkinswarm-tabs'
  STORAGE_ACCOUNT: 'helkinswarmtabsst'
  EARLY_DEV_COST_GUARD: 'true'
  EARLY_DEV_MONTHLY_BUDGET_USD: '5'

jobs:
  deploy-infra:
    name: Deploy Tab Host Infra
    runs-on: ubuntu-latest
    outputs:
      storage-account: ${{ steps.deploy.outputs.storageAccountName }}
      tab-host-url: ${{ steps.enable-static.outputs.tab-host-url }}
      tab-host-domain: ${{ steps.enable-static.outputs.tab-host-domain }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate early-dev cost guard prerequisites
        run: |
          if [ "${{ env.EARLY_DEV_COST_GUARD }}" = "true" ] && [ -z "${{ vars.ALERT_EMAIL }}" ]; then
            echo "❌ ALERT_EMAIL must be configured while the tab-host early-dev cost guard is active."
            exit 1
          fi
          echo "✅ Tab-host early-dev cost guard prerequisites are satisfied"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location eastus2 \
            --tags \
              "project=HelkinSwarm" \
              "component=tabs" \
              "env=global" \
              "repo=putersdcat/HelkinSwarm" \
              "owner=putersdcat" \
              "managedBy=deploy-tabs.yml" \
              "deployedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Resolve CICD SP Object ID
        id: cicd-sp
        run: |
          SP_OID=$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)
          echo "object-id=${SP_OID}" >> "$GITHUB_OUTPUT"
          echo "✅ CICD SP object ID: ${SP_OID}"

      - name: Deploy Bicep
        id: deploy
        run: |
          RESULT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main-tabs.bicep \
            --parameters \
              routerUamiResourceId=${{ vars.ROUTER_UAMI_ID }} \
              cicdPrincipalId=${{ steps.cicd-sp.outputs.object-id }} \
              alertEmail="${{ vars.ALERT_EMAIL }}" \
              earlyDevCostGuard=${{ env.EARLY_DEV_COST_GUARD }} \
              earlyDevMonthlyBudgetUsd=${{ env.EARLY_DEV_MONTHLY_BUDGET_USD }} \
            --query 'properties.outputs' -o json)
          echo "storageAccountName=$(echo $RESULT | jq -r '.storageAccountName.value')" >> "$GITHUB_OUTPUT"

      - name: Remove paid observability leftovers from tab host
        if: env.EARLY_DEV_COST_GUARD == 'true'
        run: |
          set +e
          delete_resource() {
            local name="$1"
            local type="$2"
            az resource delete --resource-group "${{ env.RESOURCE_GROUP }}" --name "$name" --resource-type "$type" >/dev/null 2>&1 || true
          }

          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --resource-type 'Microsoft.OperationalInsights/workspaces' --query '[].name' -o tsv 2>/dev/null | while read -r NAME; do [ -n "$NAME" ] && delete_resource "$NAME" 'Microsoft.OperationalInsights/workspaces'; done
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --resource-type 'Microsoft.Insights/components' --query '[].name' -o tsv 2>/dev/null | while read -r NAME; do [ -n "$NAME" ] && delete_resource "$NAME" 'Microsoft.Insights/components'; done
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --resource-type 'Microsoft.Insights/actionGroups' --query '[].name' -o tsv 2>/dev/null | while read -r NAME; do [ -n "$NAME" ] && delete_resource "$NAME" 'Microsoft.Insights/actionGroups'; done
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --resource-type 'Microsoft.Insights/scheduledQueryRules' --query '[].name' -o tsv 2>/dev/null | while read -r NAME; do [ -n "$NAME" ] && delete_resource "$NAME" 'Microsoft.Insights/scheduledQueryRules'; done
          echo "✅ Tab-host cleanup pass completed"

      - name: Enable static website hosting
        id: enable-static
        run: |
          az storage blob service-properties update \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --static-website \
            --index-document index.html \
            --404-document 404.html \
            --auth-mode login

          ENDPOINT=$(az storage account show \
            --name ${{ env.STORAGE_ACCOUNT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "primaryEndpoints.web" -o tsv | tr -d '/')

          echo "tab-host-url=${ENDPOINT}" >> "$GITHUB_OUTPUT"
          DOMAIN=$(echo "$ENDPOINT" | sed 's|https\?://||')
          echo "tab-host-domain=${DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "✅ Static website endpoint: ${ENDPOINT}"

      - name: Assert tab-host early-dev cost guard invariants
        if: env.EARLY_DEV_COST_GUARD == 'true'
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          SUB="${{ env.AZURE_SUBSCRIPTION_ID }}"
          BUDGET_NAME="helkinswarm-earlydev-budget-tabs"
          LAW_COUNT=$(az resource list --resource-group "$RG" --resource-type 'Microsoft.OperationalInsights/workspaces' --query 'length(@)' -o tsv)
          APPI_COUNT=$(az resource list --resource-group "$RG" --resource-type 'Microsoft.Insights/components' --query 'length(@)' -o tsv)
          ALERT_COUNT=$(az resource list --resource-group "$RG" --resource-type 'Microsoft.Insights/scheduledQueryRules' --query 'length(@)' -o tsv)
          ACTION_GROUP_COUNT=$(az resource list --resource-group "$RG" --resource-type 'Microsoft.Insights/actionGroups' --query 'length(@)' -o tsv)

          if [ "$LAW_COUNT" != "0" ] || [ "$APPI_COUNT" != "0" ] || [ "$ALERT_COUNT" != "0" ] || [ "$ACTION_GROUP_COUNT" != "0" ]; then
            echo "❌ Tab-host EARLY_DEV_COST_GUARD violation: monitor resources exist in $RG"
            echo "    LAW=$LAW_COUNT APPI=$APPI_COUNT ALERTS=$ALERT_COUNT ACTION_GROUPS=$ACTION_GROUP_COUNT"
            exit 1
          fi

          BUDGET_JSON=$(az rest --method GET --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Consumption/budgets/${BUDGET_NAME}?api-version=2024-08-01")
          BUDGET_AMOUNT=$(echo "$BUDGET_JSON" | jq -r '.properties.amount | tonumber | floor')
          if [ "$BUDGET_AMOUNT" != "${{ env.EARLY_DEV_MONTHLY_BUDGET_USD }}" ]; then
            echo "❌ Tab-host EARLY_DEV_COST_GUARD violation: RG budget amount is '$BUDGET_AMOUNT' instead of '${{ env.EARLY_DEV_MONTHLY_BUDGET_USD }}'"
            exit 1
          fi

          echo "✅ Tab-host EARLY_DEV_COST_GUARD invariants hold"

  deploy-spa:
    name: Upload Tab SPA to Storage
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for RBAC propagation
        run: |
          echo "⏳ Waiting 90s for Azure RBAC role assignment propagation..."
          sleep 90
          echo "✅ Propagation wait complete"

      - name: Inject cache-busting asset version
        env:
          TAB_ASSET_VERSION: ${{ github.sha }}
        run: |
          if [ -f "tabs/index.html" ]; then
            sed -i "s|{{TAB_ASSET_VERSION}}|${TAB_ASSET_VERSION}|g" tabs/index.html
            echo "✅ Injected TAB_ASSET_VERSION: $TAB_ASSET_VERSION"
          fi

      - name: Verify production tab host keeps runtime stamp routing enabled
        run: |
          if grep -q "{{TAB_API_BASE}}" tabs/app.js; then
            echo "✅ Production tab build keeps TAB_API_BASE unset so runtime user-map routing is authoritative"
          else
            echo "❌ tabs/app.js no longer contains the TAB_API_BASE placeholder. The hosted tab SPA must not inject a single-stamp fallback."
            exit 1
          fi

      - name: Publish public user-map for runtime stamp resolution
        run: |
          if [ ! -f "config/user-map.json" ]; then
            echo "❌ config/user-map.json not found"
            exit 1
          fi

          jq '{ version, users: (.users | with_entries(.value |= { alias, endpoint, enabled })) }' \
            config/user-map.json > tabs/user-map.json

          echo "✅ Published tabs/user-map.json with trimmed public stamp routing data"

      - name: Upload SPA assets to $web container
        run: |
          if [ -d "tabs" ] && [ "$(ls -A tabs)" ]; then
            echo "Clearing stale blobs from \$web container..."
            az storage blob delete-batch \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --source '$web' \
              --auth-mode login || true

            echo "Uploading SPA assets from tabs/ directory..."
            az storage blob upload-batch \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --destination '$web' \
              --source tabs/ \
              --auth-mode login \
              --overwrite true \
              --content-cache-control "no-cache, no-store, must-revalidate"
            echo "✅ SPA assets uploaded"
          else
            echo "⚠️  tabs/ directory not found or empty — uploading placeholder index.html"
            cat > /tmp/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>HelkinSwarm</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                     display: flex; align-items: center; justify-content: center;
                     min-height: 100vh; margin: 0; background: #1a1a2e; color: #e8e8f0; }
              .container { text-align: center; padding: 2rem; }
              h1 { color: #9b59b6; font-size: 2rem; margin-bottom: 0.5rem; }
              p { opacity: 0.7; max-width: 400px; line-height: 1.6; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>HelkinSwarm</h1>
              <p>Tab interface coming soon. The brain is online — the visual cortex is still awakening.</p>
              <p style="font-size:0.8rem; margin-top:2rem; opacity:0.5">Phase 3 — SPA under construction</p>
            </div>
          </body>
          </html>
          EOF
            az storage blob upload \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --container-name '$web' \
              --file /tmp/index.html \
              --name index.html \
              --auth-mode login \
              --overwrite true \
              --content-type 'text/html' \
              --content-cache-control 'public, max-age=300'
            cp /tmp/index.html /tmp/404.html
            az storage blob upload \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --container-name '$web' \
              --file /tmp/404.html \
              --name 404.html \
              --auth-mode login \
              --overwrite true \
              --content-type 'text/html'
            echo "✅ Placeholder index.html uploaded"
          fi

  report:
    name: Report Deployment
    needs: [deploy-infra, deploy-spa]
    runs-on: ubuntu-latest

    steps:
      - name: Report tab host URL
        env:
          TAB_HOST_URL: ${{ needs.deploy-infra.outputs.tab-host-url }}
        run: |
          echo "✅ Tab host deployed"
          echo "   URL: ${TAB_HOST_URL}"
          echo "   Early Dev Cost Guard: ${{ env.EARLY_DEV_COST_GUARD }}"
          echo "   Tabs Budget (USD): ${{ env.EARLY_DEV_MONTHLY_BUDGET_USD }}"
          echo ""
          echo "📋 Tab URL is hardcoded in appPackage/manifest.json"
          echo "   Run teams-package.yml to rebuild the Teams app package if manifest changed."
