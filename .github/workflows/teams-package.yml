# ============================================================================
# HelkinSwarm — Teams App Package: Build artifact only
# Builds the Teams app .zip and uploads it as a workflow artifact.
# Teams app-catalog publish remains delegated/manual because Microsoft Graph
# Teams app publish/update APIs do NOT support application permissions.
# ============================================================================

name: Teams App Package

on:
  workflow_dispatch:  # manual only — push trigger disabled to save Actions quota (#279)
    inputs:
      requires_review:
        description: "Reserved for delegated/manual publish flows; ignored by this build-only workflow"
        type: boolean
        default: false
      skip_publish:
        description: "Deprecated compatibility flag. This workflow is always build-only because Teams catalog publish is delegated-only in Microsoft Graph."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  package-and-publish:
    name: Build Teams App Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Inject global bot identity ─────────────────────────────────────
      # Version is owned by the developer — set it in manifest.json before pushing.
      # The pipeline NEVER bumps versions; it packages exactly what is in the repo.
      # BOT_APP_ID is set by deploy-router.yml after the router UAMI is created.
      # TAB_HOST_URL is the global tab SPA URL (set after deploy-tabs.yml runs).
      # The manifest stores {{BOT_APP_ID}}, {{TAB_HOST_URL}}, and {{TAB_HOST_DOMAIN}}
      # as placeholders; all four are substituted at build time.
      - name: Inject manifest placeholders
        env:
          BOT_APP_ID: ${{ vars.BOT_APP_ID }}
          TAB_HOST_URL: ${{ vars.TAB_HOST_URL }}
          TAB_SSO_APP_ID: ${{ vars.TAB_SSO_APP_ID }}
        run: |
          if [ -z "$BOT_APP_ID" ]; then
            echo "❌ vars.BOT_APP_ID is not set — run deploy-router workflow first"
            exit 1
          fi
          # TAB_HOST_URL is optional; if not set, tabs will 404 until tabs are deployed
          echo "BOT_APP_ID: $BOT_APP_ID"
          echo "TAB_HOST_URL: ${TAB_HOST_URL:-'(not set — tabs will 404 until deploy-tabs runs)'}"
          echo "TAB_SSO_APP_ID: ${TAB_SSO_APP_ID:-'(not set — using BOT_APP_ID as fallback)'}"
          sed -i "s/{{BOT_APP_ID}}/${BOT_APP_ID}/g" appPackage/manifest.json
          # TAB_SSO_APP_ID: DelegatedAuth app for tab SSO (falls back to BOT_APP_ID)
          SSO_ID="${TAB_SSO_APP_ID:-$BOT_APP_ID}"
          sed -i "s/{{TAB_SSO_APP_ID}}/${SSO_ID}/g" appPackage/manifest.json
          # contentUrl uses full URL; validDomains uses domain only
          if [ -n "$TAB_HOST_URL" ]; then
            TAB_HOST_DOMAIN=$(echo "$TAB_HOST_URL" | sed 's|https\?://||')
            sed -i "s|{{TAB_HOST_URL}}|${TAB_HOST_URL}|g" appPackage/manifest.json
            sed -i "s|{{TAB_HOST_DOMAIN}}|${TAB_HOST_DOMAIN}|g" appPackage/manifest.json
            echo "✅ Injected BOT_APP_ID, TAB_SSO_APP_ID, and TAB_HOST_URL: $TAB_HOST_URL"
          else
            echo "⚠️ TAB_HOST_URL not set — tabs will use placeholder URL (will work after deploy-tabs.yml runs)"
          fi

      # ── Validate manifest ──────────────────────────────────────────────
      - name: Validate manifest
        id: manifest
        run: |
          MANIFEST="appPackage/manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "❌ manifest.json not found"
            exit 1
          fi

          VERSION=$(jq -r '.version' "$MANIFEST")
          APP_ID=$(jq -r '.id' "$MANIFEST")
          BOT_ID=$(jq -r '.bots[0].botId' "$MANIFEST")
          COLOR_ICON=$(jq -r '.icons.color' "$MANIFEST")
          OUTLINE_ICON=$(jq -r '.icons.outline' "$MANIFEST")
          APP_NAME=$(jq -r '.name.short' "$MANIFEST")

          echo "🤖 Teams App Package"
          echo "  App:     $APP_NAME"
          echo "  Version: $VERSION"
          echo "  App ID:  $APP_ID"
          echo "  Bot ID:  $BOT_ID"
          echo "  Tab SPA: ${TAB_HOST_URL:-'(placeholder — set deploy-tabs.yml vars.TAB_HOST_URL)'}"
          echo "  Color:   $COLOR_ICON"
          echo "  Outline: $OUTLINE_ICON"

          # Validate version format
          if ! echo "$VERSION" | grep -qE '^[1-9][0-9]*\.[0-9]+\.[0-9]+$'; then
            echo "❌ Version '$VERSION' is not valid Teams format (#.#.# starting with non-zero)"
            exit 1
          fi

          # Validate icon files exist
          if [ ! -f "appPackage/$COLOR_ICON" ]; then
            echo "❌ Color icon not found: appPackage/$COLOR_ICON"
            exit 1
          fi
          if [ ! -f "appPackage/$OUTLINE_ICON" ]; then
            echo "❌ Outline icon not found: appPackage/$OUTLINE_ICON"
            exit 1
          fi

          # Icon size warnings (not blocking — first deploy uses placeholders)
          COLOR_SIZE=$(stat -c%s "appPackage/$COLOR_ICON")
          OUTLINE_SIZE=$(stat -c%s "appPackage/$OUTLINE_ICON")
          if [ "$COLOR_SIZE" -lt 1000 ]; then
            echo "⚠️  Color icon is only ${COLOR_SIZE} bytes — looks like a placeholder (will replace later)"
          fi
          if [ "$OUTLINE_SIZE" -lt 500 ]; then
            echo "⚠️  Outline icon is only ${OUTLINE_SIZE} bytes — looks like a placeholder (will replace later)"
          fi

          echo "✅ Manifest validation passed"

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "app-name=$APP_NAME"         >> "$GITHUB_OUTPUT"
          echo "color-icon=$COLOR_ICON"     >> "$GITHUB_OUTPUT"
          echo "outline-icon=$OUTLINE_ICON" >> "$GITHUB_OUTPUT"

      # ── Build .zip ────────────────────────────────────────────────────
      - name: Build Teams app package
        id: build
        run: |
          VERSION="${{ steps.manifest.outputs.version }}"
          COLOR_ICON="${{ steps.manifest.outputs.color-icon }}"
          OUTLINE_ICON="${{ steps.manifest.outputs.outline-icon }}"
          ZIP_NAME="HelkinSwarm-${VERSION}.zip"

          cd appPackage
          zip -j "../${ZIP_NAME}" manifest.json "${COLOR_ICON}" "${OUTLINE_ICON}"
          cd ..

          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "📦 Built: $ZIP_NAME ($ZIP_SIZE)"
          unzip -l "$ZIP_NAME"

          echo "zip-name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip-path=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      # ── Upload artifact ────────────────────────────────────────────────
      - name: Stage Teams app files for artifact
        run: |
          mkdir -p /tmp/teams-pkg
          cp appPackage/manifest.json /tmp/teams-pkg/
          cp "appPackage/${{ steps.manifest.outputs.color-icon }}" /tmp/teams-pkg/
          cp "appPackage/${{ steps.manifest.outputs.outline-icon }}" /tmp/teams-pkg/
          echo "  Staged files:"
          ls -lh /tmp/teams-pkg/

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: HelkinSwarm-${{ steps.manifest.outputs.version }}
          path: /tmp/teams-pkg/
          retention-days: 90

      # ── Delegated publish note ─────────────────────────────────────────
      - name: Explain delegated publish limitation
        id: publish
        run: |
          echo "publish-status=delegated-required" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Teams app catalog publish remains delegated/manual."
          echo "ℹ️ Microsoft Graph teamsApp publish/update APIs do not support application permissions,"
          echo "   so GitHub OIDC app-only automation cannot complete the publish step."
          if [ "${{ github.event.inputs.skip_publish }}" != "true" ]; then
            echo "⚠️ Publish was requested, but this workflow intentionally stayed build-only."
          fi

      # ── Job Summary ──────────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          VERSION="${{ steps.manifest.outputs.version }}"
          APP_NAME="${{ steps.manifest.outputs.app-name }}"
          ZIP_NAME="${{ steps.build.outputs.zip-name }}"
          PUBLISH_STATUS="${{ steps.publish.outputs.publish-status }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')

          case "$PUBLISH_STATUS" in
            delegated-required) STATUS_EMOJI="ℹ️ Delegated/manual publish required" ;;
            *)                  STATUS_EMOJI="⏭️ Build only" ;;
          esac

          {
            echo "# 🤖 Teams App Package — ${APP_NAME} v${VERSION}"
            echo ""
            echo "> **Commit:** [\`${SHORT_SHA}\`](https://github.com/putersdcat/HelkinSwarm/commit/${GITHUB_SHA}) · **${TS}**"
            echo ""
            echo "## Package"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | \`${VERSION}\` |"
            echo "| **Package** | \`${ZIP_NAME}\` |"
            echo "| **Artifact** | Download from this workflow run |"
            echo ""
            echo "## Publish Status"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${STATUS_EMOJI} |"
            echo "| **Graph publish in CI** | Not supported with application permissions; use delegated/manual publish |"
            echo ""
            echo "### Delegated Publish Fallback"
            echo ""
            echo '```powershell'
            echo "# Download the artifact from this workflow run, then publish with delegated user auth:"
            echo '.\appPackage\New-TeamsAppPackage.ps1 -Publish'
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
